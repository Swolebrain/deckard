<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Background: rounded macOS icon shape -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <linearGradient id="humanGlow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#e8d5b7"/>
      <stop offset="100%" stop-color="#c4956a"/>
    </linearGradient>
    <linearGradient id="digitalGlow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#64b5f6"/>
      <stop offset="100%" stop-color="#7c4dff"/>
    </linearGradient>
    <!-- Subtle glow filter -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- macOS rounded rect background -->
  <rect x="0" y="0" width="1024" height="1024" rx="228" ry="228" fill="url(#bg)"/>

  <!-- Connection lines between neurons (thin, subtle) -->
  <g opacity="0.3" stroke-width="2">
    <!-- Human to center connections -->
    <line x1="280" y1="340" x2="460" y2="460" stroke="#c4956a"/>
    <line x1="220" y1="512" x2="420" y2="512" stroke="#c4956a"/>
    <line x1="280" y1="680" x2="460" y2="560" stroke="#c4956a"/>
    <line x1="340" y1="260" x2="480" y2="430" stroke="#c4956a"/>
    <line x1="340" y1="760" x2="480" y2="590" stroke="#c4956a"/>

    <!-- Digital to center connections -->
    <line x1="740" y1="340" x2="560" y2="460" stroke="#7c4dff"/>
    <line x1="800" y1="512" x2="600" y2="512" stroke="#7c4dff"/>
    <line x1="740" y1="680" x2="560" y2="560" stroke="#7c4dff"/>
    <line x1="680" y1="260" x2="540" y2="430" stroke="#7c4dff"/>
    <line x1="680" y1="760" x2="540" y2="590" stroke="#7c4dff"/>

    <!-- Cross connections (human-digital bridge) -->
    <line x1="460" y1="460" x2="560" y2="460" stroke="#9a8ab8" opacity="0.6"/>
    <line x1="420" y1="512" x2="600" y2="512" stroke="#9a8ab8" opacity="0.8"/>
    <line x1="460" y1="560" x2="560" y2="560" stroke="#9a8ab8" opacity="0.6"/>
  </g>

  <!-- Human neurons (left side, warm tones) -->
  <g filter="url(#softGlow)">
    <!-- Organic, slightly irregular positioning -->
    <circle cx="280" cy="340" r="14" fill="url(#humanGlow)" opacity="0.9"/>
    <circle cx="220" cy="512" r="18" fill="url(#humanGlow)" opacity="1.0"/>
    <circle cx="280" cy="680" r="14" fill="url(#humanGlow)" opacity="0.9"/>
    <circle cx="340" cy="260" r="10" fill="url(#humanGlow)" opacity="0.7"/>
    <circle cx="340" cy="760" r="10" fill="url(#humanGlow)" opacity="0.7"/>
    <circle cx="180" cy="420" r="8" fill="url(#humanGlow)" opacity="0.5"/>
    <circle cx="180" cy="600" r="8" fill="url(#humanGlow)" opacity="0.5"/>
  </g>

  <!-- Digital neurons (right side, cool tones) -->
  <g filter="url(#softGlow)">
    <!-- More geometric, precise positioning -->
    <circle cx="740" cy="340" r="14" fill="url(#digitalGlow)" opacity="0.9"/>
    <circle cx="800" cy="512" r="18" fill="url(#digitalGlow)" opacity="1.0"/>
    <circle cx="740" cy="680" r="14" fill="url(#digitalGlow)" opacity="0.9"/>
    <circle cx="680" cy="260" r="10" fill="url(#digitalGlow)" opacity="0.7"/>
    <circle cx="680" cy="760" r="10" fill="url(#digitalGlow)" opacity="0.7"/>
    <circle cx="840" cy="420" r="8" fill="url(#digitalGlow)" opacity="0.5"/>
    <circle cx="840" cy="600" r="8" fill="url(#digitalGlow)" opacity="0.5"/>
  </g>

  <!-- Central bridge nodes (where they meet, blended color) -->
  <g filter="url(#glow)">
    <circle cx="460" cy="460" r="10" fill="#b8937a" opacity="0.8"/>
    <circle cx="512" cy="512" r="16" fill="#9a8ab8" opacity="1.0"/>
    <circle cx="560" cy="460" r="10" fill="#8a7abf" opacity="0.8"/>
    <circle cx="460" cy="560" r="10" fill="#b8937a" opacity="0.8"/>
    <circle cx="560" cy="560" r="10" fill="#8a7abf" opacity="0.8"/>
  </g>
</svg>
